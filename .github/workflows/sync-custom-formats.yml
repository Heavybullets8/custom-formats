name: Sync Custom Formats from Upstream

on:
  schedule:
    - cron: '0 1 * * *'  # Runs at 1:00 AM UTC every day
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout your repository
      - name: Checkout Your Repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history

      # Step 2: Sparse checkout of the upstream repository in pattern mode
      - name: Sparse Checkout Upstream Repository
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/TRaSH-Guides/Guides.git upstream_repo
          cd upstream_repo
          git sparse-checkout init --no-cone
          echo '/docs/json/radarr/*' >> .git/info/sparse-checkout
          echo '/docs/json/sonarr/*' >> .git/info/sparse-checkout
          echo '/docs/Radarr/Radarr-collection-of-custom-formats.md' >> .git/info/sparse-checkout
          echo '/docs/Sonarr/sonarr-collection-of-custom-formats.md' >> .git/info/sparse-checkout
          git checkout

      # Step 3: Synchronize directories and files from upstream, excluding custom files
      - name: Sync Directories and Files from Upstream
        run: |
          # Sync directories while excluding custom files
          rsync -av --delete \
            --exclude='cf/custom-language-not-original-or-english.json' \
            --exclude='cf/custom-release-title-dubbed.json' \
            upstream_repo/docs/json/radarr/ docs/json/radarr/
          rsync -av --delete \
            --exclude='cf/custom-language-not-original-or-english.json' \
            --exclude='cf/custom-release-title-dubbed.json' \
            upstream_repo/docs/json/sonarr/ docs/json/sonarr/
          # Sync specific files
          mkdir -p docs/Radarr docs/Sonarr
          rsync -av upstream_repo/docs/Radarr/Radarr-collection-of-custom-formats.md docs/Radarr/
          rsync -av upstream_repo/docs/Sonarr/sonarr-collection-of-custom-formats.md docs/Sonarr/

      # Step 4: Remove Upstream Repository
      - name: Remove Upstream Repository
        run: rm -rf upstream_repo

      # Step 5: Configure Git
      - name: Configure Git
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      # Step 6: Commit changes if there are any
      - name: Commit Changes
        run: |
          git add .
          git diff --cached --quiet || git commit -m "Sync changes from upstream"

      # Step 7: Generate Diff
      - name: Generate Diff
        id: generate_diff
        run: |
          git diff origin/master...HEAD > diff.txt
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          cat diff.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
          rm diff.txt

      # Step 8: Create or Update Pull Request
      - name: Create or Update Pull Request
        uses: peter-evans/create-pull-request@v5
        with:
          branch: sync-upstream
          commit-message: Sync changes from upstream
          title: 'Sync changes from upstream'
          body: |
            ## Changes

            ```diff
            ${{ steps.generate_diff.outputs.diff }}
            ```
          labels: 'automated update'
          assignees: 'Heavybullets8'
