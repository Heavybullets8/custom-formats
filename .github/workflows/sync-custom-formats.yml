name: Sync Custom Formats from Upstream

on:
  schedule:
    - cron: '0 1 * * *'  # Runs at 1:00 AM UTC every day
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository
      - name: Checkout repository with sparse checkout
        uses: actions/checkout@v3
        with:
          fetch-depth: 0  # Fetch all history but only for the specified branch
          ref: master  # Specify the branch to checkout

      # Step 2: Set up sparse checkout
      - name: Set up Sparse Checkout
        run: |
          git config core.sparseCheckout true
          echo "docs/json/radarr/" >> .git/info/sparse-checkout
          echo "docs/json/sonarr/" >> .git/info/sparse-checkout

      # Step 3: Add the upstream repository
      - name: Add Upstream Remote
        run: git remote add upstream https://github.com/TRaSH-Guides/Guides.git

      # Step 4: Set Git User Identity
      - name: Set Git User Identity
        run: |
          git config user.name "GitHub Action"
          git config user.email "action@github.com"

      # Step 5: Fetch and Checkout Specific Directories from Upstream
      - name: Fetch and Checkout Upstream Changes
        run: |
          git fetch upstream master
          git checkout upstream/master -- docs/json/radarr docs/json/sonarr

      # Step 6: Commit the changes (if there are any)
      - name: Commit Changes
        run: |
          git add .
          git commit -m "Sync changes from upstream" || echo "No changes to commit"

      # Step 7: Push the changes to your forked repository
      - name: Push Changes
        run: |
          git push origin master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
